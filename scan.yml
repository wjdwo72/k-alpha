name: K-ALPHA Auto Scan

on:
  schedule:
    # 장중 자동 스캔: 평일 08:00~15:30 KST (UTC 23:00~06:30)
    # KST = UTC+9  →  KST 08:00 = UTC 전날 23:00
    # UTC 기준: 23:00~23:50 (전날) + 00:00~06:30 (당일)
    # 전날 UTC 23:xx (KST 08:xx) — 일~목 실행 (KST 월~금)
    - cron: '0,10,20,30,40,50 23 * * 0,1,2,3,4'
    # UTC 00:xx ~ 05:xx (KST 09:xx ~ 14:xx) — 월~금 실행
    - cron: '0,10,20,30,40,50 0,1,2,3,4,5 * * 1-5'
    # UTC 06:00, 06:10, 06:20, 06:30 (KST 15:00~15:30) — 월~금
    - cron: '0,10,20,30 6 * * 1-5'
  workflow_dispatch:
    inputs:
      interval:
        description: '수동 스캔 — 개인방 간격(분, 10~240). 비워두면 기본값 사용. 장외/공휴일/주말에도 실행됨.'
        required: false
        default: ''

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests urllib3
      - name: K-ALPHA 스캔 실행
        env:
          KIS_AK:            ${{ secrets.KIS_AK }}
          KIS_SEC:           ${{ secrets.KIS_SEC }}
          KIS_ACC:           ${{ secrets.KIS_ACC }}
          KIS_ENV:           ${{ secrets.KIS_ENV }}
          TG_TOKEN:          ${{ secrets.TG_TOKEN }}
          # 개인방
          TG_CHAT:           ${{ secrets.TG_CHAT }}
          INTERVAL:          ${{ secrets.INTERVAL }}
          # 그룹방 (별도 설정 — 없으면 전송 안 함)
          TG_GROUP_CHAT:     ${{ secrets.TG_GROUP_CHAT }}
          TG_GROUP_INTERVAL: ${{ secrets.TG_GROUP_INTERVAL }}
          # Gist
          GIST_ID:           ${{ secrets.GIST_ID }}
          GH_TOKEN:          ${{ secrets.GH_TOKEN }}
          # 수동 실행 시 입력값 (장외/공휴일에도 강제 스캔)
          MANUAL_INTERVAL:   ${{ github.event.inputs.interval }}
        run: python scan_worker.py
