name: K-ALPHA Auto Scan

on:
  schedule:
    # 평일 09:00~15:30 KST (UTC 00:00~06:30) 10분마다
    - cron: '0,10,20,30,40,50 0,1,2,3,4,5 * * 1-5'
    - cron: '0,10,20,30 6 * * 1-5'
  workflow_dispatch:
    inputs:
      interval:
        description: '개인방 간격(분, 10~240)'
        required: false
        default: ''

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests urllib3
      - name: K-ALPHA 스캔 실행
        env:
          KIS_AK:            ${{ secrets.KIS_AK }}
          KIS_SEC:           ${{ secrets.KIS_SEC }}
          KIS_ACC:           ${{ secrets.KIS_ACC }}
          KIS_ENV:           ${{ secrets.KIS_ENV }}
          TG_TOKEN:          ${{ secrets.TG_TOKEN }}
          # 개인방
          TG_CHAT:           ${{ secrets.TG_CHAT }}
          INTERVAL:          ${{ secrets.INTERVAL }}
          # 그룹방 (별도 설정 — 없으면 전송 안 함)
          TG_GROUP_CHAT:     ${{ secrets.TG_GROUP_CHAT }}
          TG_GROUP_INTERVAL: ${{ secrets.TG_GROUP_INTERVAL }}
          # Gist
          GIST_ID:           ${{ secrets.GIST_ID }}
          GH_TOKEN:          ${{ secrets.GH_TOKEN }}
          MANUAL_INTERVAL:   ${{ github.event.inputs.interval }}
        run: python scan_worker.py
